<html>
<head>
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            margin: 10px 0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }
        .nav-btn {
            text-decoration: none;   /* removes underline */
            color: white;            /* text color */
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.3s;
            background-color: #38bdf8;
        }

        .nav-btn:hover {
            background: blueviolet;     /* button effect */
            color: black;
        }
    </style>
</head>
<body>

<div class="contact-box">
    <h1>Contact Me</h1>
    <p>Email: manishankarbodepudi05@gmail.com</p>
    <p>Phone: +91 6304775294</p>
    <p>Location: Andhra Pradesh, India</p>
    <a href="portfolio.html" class="nav-btn">BACK TO HOME</a>
</div>

</body>
</html>
